<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Learning UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>E-Learning Platform</h1>
  </header>

  <section class="courses">
    <div class="course-card">
      <h2>JavaScript Course</h2>
      <p>Progress: 70%</p>
      <progress value="70" max="100"></progress>
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/W6NZfCO5SIk"></iframe>
    </div>

    <div class="course-card">
      <h2>React Course</h2>
      <p>Progress: 40%</p>
      <progress value="40" max="100"></progress>
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/bMknfKXIFA8"></iframe>
    </div>
  </section>
</body>
</html>
